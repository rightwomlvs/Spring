<div id="lixiang-game-app"></div>

<script>
(function() {
    // === 各圈層專屬顏色色號 (根據圖片擷取) ===
    const colors = {
        default: "#bde0ef",   // 豹笑機動共議圈 - 水藍色
        beaver: "#f08b33",    // 貍尾 - 橘色
        dragon: "#2e2e2e",    // 龍翼 - 黑色
        fish: "#1352cf",      // 魚沫 - 藍色
        deer: "#569c3a",      // 鹿角 - 綠色
        cow: "#88009b",       // 牛耳 - 紫色
        bear: "#794a20"       // 熊掌 - 棕色
    };

    // === 遊戲設定與劇本 ===
    const storyData = {
        "Start": {
            text: "歡迎來到貍想教育創新學院第十屆春季班！這是一趟為期半年的共學旅程。在進入六大共學圈之前，請先感受一下當下的自己：你現在最渴望的是向內安頓身心，還是向外創造真實的改變？",
            opt1: { text: "向內尋求安頓與人際連結", target: "Node2" },
            opt2: { text: "向外探索技能與創造產出", target: "Node3" }
        },
        "Node2": {
            text: "面對充滿變動與張力的生活，你覺得最近最消耗你能量的是什麼？",
            opt1: { text: "自身任務繁重，常常感到焦慮與緊繃", target: "Node4" },
            opt2: { text: "與他人（學生、同事）溝通的摩擦與不理解", target: "Node5" }
        },
        "Node3": {
            text: "說到創造與學習，哪一種情境會讓你眼睛一亮，充滿動力？",
            opt1: { text: "掌握最新的 AI 科技與系統化工具", target: "Node6" },
            opt2: { text: "設計一套有趣的課程或文化體驗活動", target: "Node7" }
        },
        "Node4": {
            text: "當你需要為自己充電時，你傾向用哪種方式找回力量？",
            opt1: { text: "獨處靜心，建立專屬自己的日常好習慣", target: "Node8" },
            opt2: { text: "找一群懂你的人，在安全的空間裡傾吐交流", target: "Node9" }
        },
        "Node5": {
            text: "當你遇到一位不按牌理出牌、難以溝通的夥伴或學生時，你的直覺反應是？",
            opt1: { text: "想探究他背後是否有特殊的心理特質（如ADHD）", target: "Node10" },
            opt2: { text: "想用一套情緒教育（SEL）的教材來引導他", target: "Node11" }
        },
        "Node6": {
            text: "面對日新月異的科技工具，你最想把時間投資在哪裡？",
            opt1: { text: "學習 AI 提示詞與遊戲化設計，打造敏捷工作流", target: "Node12" },
            opt2: { text: "練習思維可視化，把複雜的資訊變簡單", target: "Node13" }
        },
        "Node7": {
            text: "如果要你親自策劃一場體驗，你腦海中浮現的畫面是？",
            opt1: { text: "帶領人群走入巷弄，來一場沉浸式的實地走讀", target: "Node13" },
            opt2: { text: "坐在書桌前，把模糊的靈感變成一套跨域桌遊或教材原型", target: "Node14" }
        },
        "Node8": {
            text: "知識學了很多，但日常卻做不到。你願意承諾和夥伴一起在清晨早起，進行連續 21 天的正念冥想或靜心書寫嗎？",
            opt1: { text: "我願意！我需要這種互相督促的實踐", target: "BeaverEnd" },
            opt2: { text: "早起有點困難，我比較想透過走讀去感受環境", target: "Node16" }
        },
        "Node9": {
            text: "聽到同事在抱怨某個問題學生，你的心裡其實更想這麼做：",
            opt1: { text: "創造一個不帶評判的空間，傾聽並同理彼此的耗損", target: "BearEnd" },
            opt2: { text: "不如我們來設計一個有趣的戶外活動，讓他發洩精力", target: "Node14" }
        },
        "Node10": {
            text: "你發現這位學生其實是需要特別的支持。你會希望如何幫助他？",
            opt1: { text: "和社群夥伴一起研究案例，成為能真正接住他的人", target: "BearEnd" },
            opt2: { text: "把他需要的引導步驟，開發成一款最小可行性產品（MVP）", target: "Node11" }
        },
        "Node11": {
            text: "你的腦海中浮現了一個很棒的情緒教育（SEL）教材點子！接下來你打算怎麼做？",
            opt1: { text: "和夥伴一起安全試錯，先把教案原型（MVP）產出並測試", target: "FishEnd" },
            opt2: { text: "我想先用 AI 工具輔助我生成豐富的圖文素材", target: "Node12" }
        },
        "Node12": {
            text: "AI 時代來臨，只要指令對了就能事半功倍。你想不想導入遊戲化思維，讓自己的產出效率如虎添翼？",
            opt1: { text: "太想了！我要掌握 AI 協作與遊戲化設計", target: "DeerEnd" },
            opt2: { text: "比起效率，我更想用新工具來向世界訴說臺灣的故事", target: "Node15" }
        },
        "Node13": {
            text: "你成功將複雜的教育理念思維可視化了！下一步，你想把它應用在哪裡？",
            opt1: { text: "把它變成一個實體走讀活動的路線圖", target: "Node14" },
            opt2: { text: "加上 AI 輔助，製作成高質感的教學簡報包", target: "DeerEnd" }
        },
        "Node14": {
            text: "實體的走讀活動除了內容，還需要強大的口語表達能力。你準備好接受 See Think Wonder 架構與口語表達的雙重訓練了嗎？",
            opt1: { text: "沒問題！我想成為有感染力的活動實踐者", target: "DragonEnd" },
            opt2: { text: "我口語比較害羞，想專注在背後的在地文史脈絡就好", target: "Node16" }
        },
        "Node15": {
            text: "當你在設計這款體驗或遊戲時，你最希望傳遞的核心精神是？",
            opt1: { text: "不卑不亢地展現臺灣在地文化，與國際接軌", target: "CowEnd" },
            opt2: { text: "讓使用者在遊玩過程中，學會溝通與同理心", target: "FishEnd" }
        },
        "Node16": {
            text: "漫步在巷弄，看著充滿故事的紅磚牆，你此刻的感悟是？",
            opt1: { text: "每一塊磚都有歷史，我想把這份土地的認同感記錄下來", target: "CowEnd" },
            opt2: { text: "這個空間的光影讓人感到平靜，我想記錄下這份身心的安頓", target: "BeaverEnd" }
        },
        
        // === 結局節點 (加入專屬顏色與標題) ===
        "BeaverEnd": {
            title: "貍尾社群共築圈",
            themeColor: colors.beaver,
            text: "歡迎加入！在這裡，我們不談生硬的大道理，而是透過晨間正念冥想與靜心書寫，陪伴彼此將青色組織的理念帶入日常。先把自己安頓好，才能在張力中看見更多可能。",
            opt1: { text: "重新探索", target: "Start", isEnd: true }
        },
        "BearEnd": {
            title: "熊掌互助共融圈",
            themeColor: colors.bear,
            text: "歡迎加入！你有一顆溫柔且包容的心。在這裡，我們將透過真實案例探究，學習理解多樣的特質（如ADHD、ASD），不急著下評判，成為彼此最堅實的心理支持者。",
            opt1: { text: "重新探索", target: "Start", isEnd: true }
        },
        "FishEnd": {
            title: "魚沫設計共學圈",
            themeColor: colors.fish,
            text: "歡迎加入！從零開始，安全試錯。我們將陪伴你把跨域教材與 SEL 情緒教育的點子，在充滿彈性的非同步協作中，一步步打造成專屬你的最小可行性產品（MVP）！",
            opt1: { text: "重新探索", target: "Start", isEnd: true }
        },
        "DeerEnd": {
            title: "鹿角科技共享圈",
            themeColor: colors.deer,
            text: "歡迎加入！跟上時代的腳步，讓我們用 AI 協作與思維可視化武裝自己。透過共學遊戲化設計，你將建立屬於自己的敏捷工作流，在科技浪潮與教學備課中如虎添翼！",
            opt1: { text: "重新探索", target: "Start", isEnd: true }
        },
        "CowEnd": {
            title: "牛耳認同共構圈",
            themeColor: colors.cow,
            text: "歡迎加入！越在地，越國際。我們將一起探究臺灣土地的故事，不流於觀光打卡，而是建立深厚的文化認同，並產出實體卡牌，搭起與國際教育交流的對話橋樑。",
            opt1: { text: "重新探索", target: "Start", isEnd: true }
        },
        "DragonEnd": {
            title: "龍翼活動共創圈",
            themeColor: colors.dragon,
            text: "歡迎加入！讓我們把教室無限延伸。在這裡你將學習 See Think Wonder 課程架構，設計好玩的活動式走讀教案，並透過實地演練，大幅提升口語表達的專業魅力！",
            opt1: { text: "重新探索", target: "Start", isEnd: true }
        }
    };

    // === 動態注入響應式 CSS 樣式 ===
    const style = document.createElement('style');
    style.innerHTML = `
        #lixiang-game-app {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, '微軟正黑體';
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            box-sizing: border-box;
            width: 92%;
            max-width: 600px;
            margin: 20px auto;
            padding: 30px;
            text-align: center;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
            color: #333;
            overflow: hidden;
        }
        #lixiang-game-title {
            margin: -30px -30px 20px -30px; /* 讓底色填滿頂部 */
            padding: 20px 15px;
            font-size: 1.4rem;
            font-weight: bold;
            transition: background-color 0.4s ease, color 0.4s ease;
        }
        #lixiang-story-text {
            font-size: 1.15rem;
            line-height: 1.6;
            margin: 30px 0;
            min-height: 80px;
            word-wrap: break-word;
        }
        .lixiang-options-wrapper {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .lixiang-btn {
            display: block;
            width: 100%;
            background-color: #f1f5f9;
            color: #334155;
            border: 2px solid #e2e8f0;
            padding: 16px 20px;
            border-radius: 8px;
            font-size: 1.05rem;
            font-weight: bold;
            line-height: 1.4;
            cursor: pointer;
            transition: all 0.2s ease;
            box-sizing: border-box;
            white-space: normal;
        }
        .lixiang-btn:hover {
            background-color: #e2e8f0;
            border-color: #cbd5e1;
        }
        .lixiang-btn:active {
            transform: scale(0.98);
        }
        /* 結果頁重新開始按鈕樣式 */
        .lixiang-btn-restart {
            color: white;
            border: none;
        }
        .lixiang-btn-restart:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        /* --- 手機版響應式微調 --- */
        @media screen and (max-width: 480px) {
            #lixiang-game-app {
                width: 95%;
                padding: 25px 20px;
            }
            #lixiang-game-title {
                margin: -25px -20px 20px -20px;
                font-size: 1.25rem;
            }
            #lixiang-story-text {
                font-size: 1.05rem;
                margin: 20px 0;
            }
            .lixiang-btn {
                padding: 14px 16px;
                font-size: 1rem;
            }
        }
    `;
    document.head.appendChild(style);

    // === 遊戲引擎邏輯 ===
    const appContainer = document.getElementById('lixiang-game-app');
    
    function renderNode(nodeId) {
        const node = storyData[nodeId];
        
        // 判斷是否為結局頁，決定表頭標題與顏色
        const currentTitle = node.title || "貍想教育創新學院 春季班";
        const themeColor = node.themeColor || colors.default;
        // 如果是豹笑的水藍色，字體用深色較好閱讀；如果是結局的深色，字體用白色
        const titleTextColor = node.themeColor ? "#ffffff" : "#1a4a6b";

        // 建立畫面
        let htmlContent = `
            <div id="lixiang-game-title" style="background-color: ${themeColor}; color: ${titleTextColor};">
                ${currentTitle}
            </div>
            <div id="lixiang-story-text">${node.text}</div>
            <div id="lixiang-options-container" class="lixiang-options-wrapper"></div>
        `;
        appContainer.innerHTML = htmlContent;

        const optionsContainer = document.getElementById('lixiang-options-container');

        // 生成按鈕 1
        if (node.opt1) {
            const btn1 = document.createElement('button');
            btn1.className = node.opt1.isEnd ? 'lixiang-btn lixiang-btn-restart' : 'lixiang-btn';
            btn1.innerText = node.opt1.text;
            
            // 如果是結局的重新開始按鈕，套用該圈層的專屬顏色
            if (node.opt1.isEnd) {
                btn1.style.backgroundColor = themeColor;
            }
            
            btn1.onclick = function() { renderNode(node.opt1.target); };
            optionsContainer.appendChild(btn1);
        }

        // 生成按鈕 2
        if (node.opt2) {
            const btn2 = document.createElement('button');
            btn2.className = 'lixiang-btn';
            btn2.innerText = node.opt2.text;
            btn2.onclick = function() { renderNode(node.opt2.target); };
            optionsContainer.appendChild(btn2);
        }
    }

    // 啟動遊戲
    setTimeout(function() {
        if(appContainer) {
            renderNode("Start");
        }
    }, 50);

})();
</script>
